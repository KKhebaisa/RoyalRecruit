version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: royalrecruit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: ../backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  bot:
    build: ../bot
    env_file:
      - ../.env
    depends_on:
      - api

  dashboard:
    build: ../dashboard
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
